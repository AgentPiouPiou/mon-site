<!DOCTYPE html>
<html>
<body>

<h1>PC connectés</h1>

<button onclick="refresh()">Actualiser</button>

<pre id="result"></pre>

<script>
function refresh() {
    fetch("https://mon-api-mmlc.onrender.com/clients")
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerText =
            JSON.stringify(data, null, 2);
    });
}
</script>

</body>
</html>
