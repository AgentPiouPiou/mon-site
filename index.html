<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remote Screen</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card red" id="card">
    <div class="circle"></div>
    <span id="text">Aucun appareil connecté</span>
</div>

<div id="screens-wrapper">
    <div id="screens-container"></div>
</div>

<button id="toggle-controls">Contrôles souris</button>

<div id="controls" class="hidden">
    <div id="joystick"></div>

    <div id="buttons">
        <button id="left-click">L</button>
        <button id="right-click">R</button>
    </div>
</div>


<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="script.js"></script>

</body>
</html>
